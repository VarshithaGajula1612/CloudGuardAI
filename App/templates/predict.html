{% extends "base.html" %}

{% block title %}Home - Cyber Incidents Detection{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">

      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-4">

          <h2 class="text-center mb-4 text-primary fw-bold">
            🛡️ Cyber Incidents Detection
          </h2>

          <form method="POST">
            <div class="mb-3">
              <label for="user_input" class="form-label fw-semibold">
                Enter input (comma-separated)
              </label>
              <textarea
                name="user_input"
                id="user_input"
                rows="4"
                class="form-control"
                placeholder="Example: suspicious login, data exfiltration, phishing attempt..."
                required
              ></textarea>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary btn-lg">
                Predict
              </button>
            </div>
          </form>

          {% if prediction %}
          <div class="alert alert-info mt-4 rounded-3">
            <h5 class="mb-2">
              <i class="bi bi-graph-up"></i> Predicted Outcome:
            </h5>
            <p class="fs-5 fw-semibold text-success">{{ prediction }}</p>
            <p class="mb-0">
              <strong>Confidence:</strong> {{ confidence|round(2) }}%
            </p>
          </div>
          {% endif %}

        </div>
      </div>
      
    </div>
  </div>
</div>
{% endblock %}
